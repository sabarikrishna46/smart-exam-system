<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidated Absentees Statement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1));
            background-color: #f5f7fa;
            min-height: 100vh;
            padding: 30px 0;
        }
        .container-main {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        .back-to-dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .back-to-dashboard a {
            display: inline-block;
            padding: 10px 20px;
            background: #34495e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(52, 73, 94, 0.2);
        }
        .back-to-dashboard a:hover {
            background: #2c3e50;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 73, 94, 0.3);
        }
        .header-section {
            text-align: center;
            border-bottom: 3px solid #5b7b9e;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header-section h1 {
            font-weight: bold;
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
            color: #34495e;
            text-transform: uppercase;
        }
        .header-section h2 {
            font-weight: bold;
            font-size: 20px;
            margin: 10px 0 0 0;
            color: #34495e;
        }
        .header-section h3 {
            font-weight: bold;
            font-size: 18px;
            margin: 10px 0 0 0;
            color: #5b7b9e;
        }
        .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            border-left: 4px solid #5b7b9e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .info-item {
            font-size: 14px;
        }
        .info-item label {
            font-weight: bold;
            color: #34495e;
        }
        .info-item span {
            color: #666;
            margin-left: 10px;
            font-weight: 500;
        }
        .filter-section {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .filter-section .form-label {
            font-weight: bold;
            margin-bottom: 10px;
            color: #34495e;
        }
        .filter-section select {
            max-width: 300px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        .filter-section select:focus {
            border-color: #5b7b9e;
            box-shadow: 0 0 0 3px rgba(91, 123, 158, 0.1);
        }
        .btn-filter {
            background: #5b7b9e;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(91, 123, 158, 0.2);
        }
        .btn-filter:hover {
            background: #4a6478;
            color: white;
            text-decoration: none;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(91, 123, 158, 0.3);
        }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        table thead {
            background: #34495e;
            color: white;
        }
        table th {
            padding: 12px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #ddd;
        }
        table td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        table tbody tr:nth-child(odd) {
            background: #f9f9f9;
        }
        table tbody tr:hover {
            background: rgba(91, 123, 158, 0.05);
        }
        table tbody tr:first-child td {
            background: #e8f0f8;
            font-weight: bold;
        }
        .no-data {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 16px;
        }
        .print-btn {
            margin-top: 20px;
            text-align: right;
        }
        .print-btn button {
            background: #5da28d;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(93, 162, 141, 0.2);
        }
        .print-btn button:hover {
            background: #4a8a74;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(93, 162, 141, 0.3);
        }
        @media print {
            body {
                background: white;
            }
            .filter-section, .print-btn, .back-to-dashboard {
                display: none;
            }
            .container-main {
                box-shadow: none;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- Back to Dashboard Button -->
        <div class="back-to-dashboard">
            <a href="{{ url_for('seating') }}">← Back to Seating</a>
        </div>

        <!-- Header Section -->
        <div class="header-section">
            <h1>ALAGAPPA UNIVERSITY</h1>
            <h1>KARAIKUDI-3</h1>
            <h2>DISTANCE EDUCATION EXAMINATION</h2>
            <h3>CONSOLIDATED ABSENTEES STATEMENT</h3>
        </div>

        <!-- Info Section -->
        <div class="info-section">
            <div class="info-item">
                <label>CENTER:</label>
                <span>AUO1 - ALAGAPPA GOVT.ARTS.COLLEGE, KARAIKUDI</span>
            </div>
            <div class="info-item">
                <label>COURSE:</label>
                <span id="courseDisplay">--</span>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <label for="department" class="form-label">SELECT DEPARTMENT:</label>
            <div style="display: flex; gap: 10px; align-items: flex-end;">
                <select id="department" class="form-select" style="max-width: 300px;">
                    <option value="">-- Select Department --</option>
                </select>
                <button type="button" class="btn-filter" onclick="loadAbsenteesStatement()">Load Statement</button>
                <button type="button" class="btn-filter" style="background: #6c757d;" onclick="window.print()">Print</button>
            </div>
        </div>

        <!-- Table Section -->
        <div class="table-container" id="tableSection">
            <p class="no-data">Select a department and click "Load Statement" to view data</p>
        </div>

        <!-- Print Button -->
        <div class="print-btn" id="printBtn" style="display: none;">
            <button type="button" onclick="window.print()">Print Statement</button>
            <button type="button" onclick="history.back()">Back</button>
        </div>
    </div>

    <script>
        // Load departments on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadDepartments();
        });

        function loadDepartments() {
            fetch('/api/departments')
                .then(response => response.json())
                .then(data => {
                    const departmentSelect = document.getElementById('department');
                    data.departments.forEach(dept => {
                        const option = document.createElement('option');
                        option.value = dept;
                        option.textContent = dept;
                        departmentSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error loading departments:', error);
                    alert('Error loading departments. Please refresh the page.');
                });
        }

        function loadAbsenteesStatement() {
            const department = document.getElementById('department').value;
            
            if (!department) {
                alert('Please select a department');
                return;
            }

            // Update course display
            document.getElementById('courseDisplay').textContent = department;

            // Fetch absentees data
            fetch(`/api/absentees-statement?department=${department}`)
                .then(response => response.json())
                .then(data => {
                    displayAbsenteesStatement(data, department);
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('tableSection').innerHTML = 
                        '<p class="no-data">Error loading data. Please try again.</p>';
                });
        }

        function displayAbsenteesStatement(data, department) {
            const tableSection = document.getElementById('tableSection');
            const printBtn = document.getElementById('printBtn');

            if (!data.exams || data.exams.length === 0) {
                tableSection.innerHTML = '<p class="no-data">No absentees data found for this department</p>';
                printBtn.style.display = 'none';
                return;
            }

            let html = '<table>';
            html += '<thead><tr>';
            html += '<th>S.NO</th>';
            html += '<th>DATE</th>';
            html += '<th>TIME</th>';
            html += '<th>SUBJECT</th>';
            html += '<th>REGISTER NO OF ABSENTEES</th>';
            html += '<th>TOTAL</th>';
            html += '</tr></thead><tbody>';

            let sno = 1;
            data.exams.forEach(exam => {
                const absenteesList = exam.absentees.map(a => a.roll_no).join(', ');
                const absentCount = exam.absent_count || 0;
                const totalCount = exam.total_students || 0;

                html += '<tr>';
                html += `<td>${sno}</td>`;
                html += `<td>${exam.exam_date || '--'}</td>`;
                html += `<td>${exam.exam_time || '--'}</td>`;
                html += `<td>${exam.subject || exam.exam_code || '--'}</td>`;
                html += `<td style="text-align: left; padding: 10px;">${absenteesList || 'None'}</td>`;
                html += `<td>${absentCount}/${totalCount}</td>`;
                html += '</tr>';
                
                sno++;
            });

            html += '</tbody></table>';
            tableSection.innerHTML = html;
            printBtn.style.display = 'block';
        }

        // Load statement on Enter key
        document.getElementById('department').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadAbsenteesStatement();
            }
        });
    </script>
</body>
</html>
